<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
</head>
<body style="font-family: Arial, sans-serif; color: #333; line-height: 1.6;">
    <div style="max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #eee; border-radius: 8px;">
        <h2 style="color: #2c3e50;">Hello {{ name }},</h2>
        <p>This is an automated notification from FinanceCalculator.</p>
        <div style="padding: 15px; background-color: #f8f9fa; border-left: 4px solid #3498db; margin: 20px 0;">
            <p style="margin: 0;">{{ message }}</p>
        </div>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
        <p style="font-size: 12px; color: #7f8c8d; text-align: center;">&copy; FinanceCalculator Production System</p>
    </div>
</body>
</html>
